<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9f5ff;
      color: #4b0082;
    }
    .container {
      max-width: 600px;
      margin: 20px auto;
      padding: 20px;
      border: 2px solid #9b59b6;
      border-radius: 10px;
      background-color: #f3e5f5;
    }
    h2 {
      color: #6a0dad;
    }
    p {
      font-size: 1rem;
      line-height: 1.5;
    }
    .otp {
      font-size: 1.8em;
      font-weight: bold;
      color: #8e44ad;
      background-color: #e1bee7;
      padding: 10px 15px;
      border-radius: 5px;
      display: inline-block;
      margin: 10px 0;
    }
    .footer {
      font-size: 0.9em;
      color: #6a0dad;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Restablece tu contraseña</h2>
    <p>Hola {{ username }},</p>
    <p>Recibimos una solicitud para restablecer tu contraseña.</p>
    <p>Si no fuiste vos, ignorá este correo. Si fuiste vos, usá este código:</p>
    <p class="otp">{{ otp }}</p>
    <p>Este código es válido por {{ valid_minutes }} minutos.</p>
    <p class="footer">Gracias,<br>Jex</p>
  </div>
</body>
</html>
